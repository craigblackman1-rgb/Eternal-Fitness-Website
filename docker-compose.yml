services:
  app:
    build:
      context: .
      target: dev
    container_name: eternal-fitness-hub
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
